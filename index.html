<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机字符串生成器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fafafa; padding: 20px; }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #333; }
        .card { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 24px; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 500; }
        input[type="number"] { padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; width: 100px; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px; font-family: monospace; font-size: 16px; text-align: center; letter-spacing: 2px; }
        .btn { padding: 8px 20px; border-radius: 4px; cursor: pointer; border: none; font-size: 14px; margin-right: 8px; }
        .btn-blue { background: #007bff; color: #fff; }
        .btn-green { background: #28a745; color: #fff; }
        .btn-gray { background: #6c757d; color: #fff; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 16px; }
        .checkbox-item { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .checkbox-item input { width: auto; }
        .output { background: #f5f5f5; padding: 20px; border-radius: 8px; text-align: center; min-height: 60px; }
        .output-text { font-size: 1.3rem; font-family: monospace; letter-spacing: 2px; word-break: break-all; }
        .history { margin-top: 16px; }
        .history-item { padding: 8px 12px; background: #fff; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; font-family: monospace; font-size: 14px; display: flex; justify-content: space-between; align-items: center; }
        .history-text { flex: 1; word-break: break-all; margin-right: 8px; }
        .length-control { display: flex; align-items: center; gap: 12px; }
        .length-control input { width: 120px; }
        .length-display { font-weight: 600; color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>随机字符串生成器</h1>
        <div class="card">
            <div class="length-control">
                <label>字符串长度:</label>
                <input type="number" id="length" value="16" min="1" max="1000">
                <span class="length-display" id="lengthDisplay">16</span>
            </div>
            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="lowercase" checked> 小写字母 (a-z)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="uppercase" checked> 大写字母 (A-Z)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="numbers" checked> 数字 (0-9)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="symbols"> 特殊字符 (!@#$%^&*)
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="spaces"> 空格
                </label>
            </div>
            <button class="btn btn-blue" onclick="generate()">生成</button>
            <button class="btn btn-gray" onclick="clearHistory()">清空历史</button>
        </div>
        <div class="card">
            <label>生成结果</label>
            <div class="output">
                <div class="output-text" id="result">点击生成按钮创建随机字符串</div>
            </div>
            <div style="margin-top:12px;">
                <button class="btn btn-green" onclick="copyResult()">复制</button>
                <button class="btn btn-blue" onclick="saveToHistory()">保存到历史</button>
            </div>
        </div>
        <div class="card">
            <label>历史记录</label>
            <div class="history" id="history"></div>
        </div>
    </div>
    <script>
        const lowercase = 'abcdefghijklmnopqrstuvwxyz';
        const uppercase = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const numbers = '0123456789';
        const symbols = '!@#$%^&*()_+-=[]{}|;:,.<>?';
        const spaces = ' ';
        
        let history = [];
        
        document.getElementById('length').addEventListener('input', function() {
            document.getElementById('lengthDisplay').textContent = this.value;
        });
        
        function generate() {
            let charset = '';
            if (document.getElementById('lowercase').checked) charset += lowercase;
            if (document.getElementById('uppercase').checked) charset += uppercase;
            if (document.getElementById('numbers').checked) charset += numbers;
            if (document.getElementById('symbols').checked) charset += symbols;
            if (document.getElementById('spaces').checked) charset += spaces;
            
            if (!charset) {
                alert('请至少选择一种字符类型');
                return;
            }
            
            const length = parseInt(document.getElementById('length').value) || 16;
            let result = '';
            const array = new Uint32Array(length);
            crypto.getRandomValues(array);
            
            for (let i = 0; i < length; i++) {
                result += charset[array[i] % charset.length];
            }
            
            document.getElementById('result').textContent = result;
            window.currentResult = result;
        }
        
        function copyResult() {
            const text = window.currentResult || document.getElementById('result').textContent;
            if (!text || text === '点击生成按钮创建随机字符串') return;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = '已复制!';
                setTimeout(() => btn.textContent = '复制', 1500);
            });
        }
        
        function saveToHistory() {
            const text = window.currentResult;
            if (!text) return;
            history.unshift({ text, time: new Date().toLocaleTimeString() });
            if (history.length > 20) history.pop();
            renderHistory();
        }
        
        function renderHistory() {
            document.getElementById('history').innerHTML = history.map((h, i) => `
                <div class="history-item">
                    <span class="history-text">${h.text}</span>
                    <button class="btn btn-blue" onclick="copyHistory(${i})" style="padding:4px 8px;font-size:12px;">复制</button>
                </div>
            `).join('');
        }
        
        function copyHistory(index) {
            navigator.clipboard.writeText(history[index].text);
            event.target.textContent = '已复制!';
            setTimeout(() => event.target.textContent = '复制', 1500);
        }
        
        function clearHistory() {
            history = [];
            renderHistory();
        }
        
        generate();
    </script>
</body>
</html>
