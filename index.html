<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>й—…еҝ”жәҖзҖӣжҘғоғҒж¶“иҢ¬ж•“йҺҙж„¬ж«’</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fafafa;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;padding:20px;min-height:100vh}
.container{max-width:650px;margin:0 auto}
h1{text-align:center;color:#333;margin-bottom:24px;font-size:22px}
.card{background:#fff;border:1px solid #e0e0e0;border-radius:8px;padding:24px;margin-bottom:16px}
label{display:block;font-weight:600;margin-bottom:6px;color:#555;font-size:14px}
input[type="number"]{width:100px;padding:8px;border:1px solid #ddd;border-radius:4px;font-size:14px}
.btn{background:#007bff;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-size:14px;margin-top:8px}
.btn:hover{background:#0056b3}
.btn-green{background:#28a745}
.btn-green:hover{background:#218838}
.charsets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.charset-opt{display:flex;align-items:center;gap:6px;cursor:pointer;padding:6px 8px;border-radius:4px;transition:background .15s}
.charset-opt:hover{background:#f5f5f5}
.charset-opt input{cursor:pointer}
.charset-opt label{margin:0;cursor:pointer;font-weight:normal;font-size:14px}
.result{background:#f5f5f5;padding:14px;border-radius:4px;font-family:monospace;font-size:16px;margin-top:12px;word-break:break-all;min-height:50px;letter-spacing:1px}
.actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.row{display:flex;align-items:center;gap:12px;margin-top:8px}
.row label{margin:0;white-space:nowrap}
.history{max-height:200px;overflow-y:auto;margin-top:8px}
.history-item{padding:6px 8px;font-family:monospace;font-size:13px;border-bottom:1px solid #eee;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.history-item:hover{background:#f0f7ff}
.copy-btn{background:none;border:1px solid #ccc;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px}
.copy-btn:hover{background:#e0e0e0}
</style>
</head>
<body>
<div class="container">
<h1>й—…еҝ”жәҖзҖӣжҘғоғҒж¶“иҢ¬ж•“йҺҙж„¬ж«’</h1>
<div class="card">
<div class="row">
<label>й—Җеһ®е®ій”ӣ?/label>
<input type="number" id="length" value="16" min="1" max="10000">
<label>йҸҒдјҙеҷәй”ӣ?/label>
<input type="number" id="count" value="1" min="1" max="100">
</div>
<label>зҖӣжҘғоғҒй—Ҷ?/label>
<div class="charsets">
<div class="charset-opt"><input type="checkbox" id="lower" checked><label for="lower">зҒҸеҝ“е•“зҖӣжҘҒзҳқ (a-z)</label></div>
<div class="charset-opt"><input type="checkbox" id="upper" checked><label for="upper">жҫ¶Сғе•“зҖӣжҘҒзҳқ (A-Z)</label></div>
<div class="charset-opt"><input type="checkbox" id="digits" checked><label for="digits">йҸҒжқҝз“§ (0-9)</label></div>
<div class="charset-opt"><input type="checkbox" id="symbols"><label for="symbols">йҗ—и§„з•©з»—п№ҖеҪҝ (!@#$...)</label></div>
<div class="charset-opt"><input type="checkbox" id="hex"><label for="hex">жө е‘ӯеҙ„йҚҸо…Ўз№ҳйҚ’?(0-9a-f)</label></div>
<div class="charset-opt"><input type="checkbox" id="noAmbiguous"><label for="noAmbiguous">йҺәжҺ—ж«ҺйҸ„ж’ҙиҙ©еЁЈе——з“§з»—?(0Oo1lI)</label></div>
</div>
<div style="display:flex;gap:8px">
<button class="btn" onclick="generate()">йҗўзҶёеһҡ</button>
<button class="btn btn-green" onclick="generate()">й–Іе¶ҶжҹҠйҗўзҶёеһҡ</button>
</div>
<div class="result" id="result"></div>
<div class="actions">
<button class="btn btn-green" onclick="copyResult()">жҫ¶е¶…еҹ—зјҒж’ҙзҒү</button>
</div>
</div>
<div class="card">
<label>йҗўзҶёеһҡйҚҳе——еҪ¶</label>
<div class="history" id="history"></div>
</div>
</div>
<script>
let history=[];
function getCharset(){
const sets={
lower:'abcdefghijklmnopqrstuvwxyz',
upper:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
digits:'0123456789',
symbols:'!@#$%^&*()_+-=[]{}|;:,.<>?'
};
let chars='';
const hex='0123456789abcdef';
if(document.getElementById('hex').checked){
chars=hex;
}else{
if(document.getElementById('lower').checked)chars+=sets.lower;
if(document.getElementById('upper').checked)chars+=sets.upper;
if(document.getElementById('digits').checked)chars+=sets.digits;
if(document.getElementById('symbols').checked)chars+=sets.symbols;
}
if(document.getElementById('noAmbiguous').checked){
chars=chars.replace(/[0Oo1lI]/g,'');
}
return chars;
}
function generateString(len,chars){
const arr=new Uint32Array(len);
crypto.getRandomValues(arr);
return Array.from(arr,v=>chars[v%chars.length]).join('');
}
function generate(){
const chars=getCharset();
if(!chars){alert('з’Үз–ҜеҡҰзҒҸжҲҰвӮ¬еӨӢе«Ёж¶“вӮ¬ж¶“оҒ„з“§з»—п№ӮжіҰ');return}
const len=parseInt(document.getElementById('length').value)||16;
const count=parseInt(document.getElementById('count').value)||1;
const results=[];
for(let i=0;i<count;i++){
results.push(generateString(len,chars));
}
const output=count===1?results[0]:results.join('\n');
document.getElementById('result').textContent=output;
history.unshift(...results);
if(history.length>50)history=history.slice(0,50);
renderHistory();
}
function renderHistory(){
document.getElementById('history').innerHTML=history.slice(0,20).map((s,i)=>
`<div class="history-item" onclick="navigator.clipboard.writeText('${s.replace(/'/g,"\\'")}')"><span>${s.length>50?s.slice(0,50)+'...':s}</span><span class="copy-btn">жҫ¶е¶…еҹ—</span></div>`
).join('');
}
function copyResult(){
navigator.clipboard.writeText(document.getElementById('result').textContent);
alert('е®ёжҸ’оҳІйҚ’и·әеҹҢйҚ“оҒҮеҲӣйҸү?');
}
generate();
</script>
</body>
</html>
